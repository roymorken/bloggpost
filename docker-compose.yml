services:
  postgres:
    image: postgres:16-alpine
    container_name: bloggpost-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-bloggpost}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bloggpost_dev}
      POSTGRES_DB: ${DB_NAME:-bloggpost}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bloggpost}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bloggpost-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
